name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Validate marketplace and plugin structure
        run: node plugins/marketplace-kit/skills/marketplace-kit/scripts/validate-marketplace.mjs .
      - name: Lint our own prose with sloplint (strict)
        run: node plugins/no-slop/skills/writing/scripts/sloplint.mjs --strict README.md plugins/*/README.md plugins/*/skills/*/SKILL.md
      - name: Audit every README with readme-that-sells
        run: |
          shopt -s nullglob
          fail=0
          for f in README.md plugins/*/README.md; do
            node plugins/readme-that-sells/skills/readme/scripts/audit-readme.mjs "$f" >/dev/null || { echo "readme audit failed: $f"; fail=1; }
          done
          exit $fail
      - name: Run plugin test suites
        run: |
          shopt -s nullglob
          suites=(plugins/*/tests/*.test.mjs)
          if [ ${#suites[@]} -gt 0 ]; then
            node --test "${suites[@]}"
          else
            echo "no test suites yet"
          fi
